<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Issue | Tracker</title>
    <!-- link css  -->
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./assets/github (1).png" type="image/x-icon">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind and daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <div class="min-h-screen flex justify-center items-center">
        <div class="bg-white shadow-2xl rounded-2xl w-[500px] ">
            <div class="logo pt-8 flex justify-center ">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <div class="pt-4 text-center">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>

            <div class="w-full shrink-0 ">
                <div class="card-body">
                    <fieldset class="fieldset space-y-3">
                        <label class=" text-xl font-bold">Username</label>
                        <div>
                            <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
                            <p class="text-cyan-500">Default: admin</p>
                        </div>
                        <label class="text-xl font-bold">Password</label>
                        <div>
                            <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
                            <p class="text-cyan-500">Default: admin123</p>
                        </div>

                        <button id="login-btn" class="btn btn-primary rounded-xl mt-6">Sign In</button>

                        <div class="flex items-center gap-3 my-3">
                            <hr class="flex-1 border-gray-300">
                            <span class="text-gray-400 font-medium">OR</span>
                            <hr class="flex-1 border-gray-300">
                        </div>
                        <div>
                            <h3 class="font-medium mb-2 text-center text-gray-400 ">Demo Credentials:</h3>
                            <div class="bg-gray-100 p-4 text-center rounded-2xl">
                                <p><span class="font-bold">Username:</span> admin</p>
                                <p><span class="font-bold">Password:</span> admin123</p>
                            </div>
                        </div>

                    </fieldset>
                </div>
            </div>
        </div>
    </div>


    <script src="./scripts.js"></script>
</body>

</html>
