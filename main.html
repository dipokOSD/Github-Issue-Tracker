<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Issue | Tracker</title>
    <!-- link css  -->
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./assets/github (1).png" type="image/x-icon">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind and daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="w-11/12 mx-auto flex flex-col md:flex-row justify-between items-center gap-3">
                <div class="flex gap-3 items-center justify-center md:justify-start">
                    <img src="./assets/github-logo.png" alt="">
                    <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                </div>
                <div class="flex gap-3">
                    <label class="input input-bordered flex items-center gap-2">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="input-search" type="text" class="grow" placeholder="Search" />
                    </label>
                    <button id="btn-search" class="btn btn-primary">+ New Issue</button>
                </div>
            </div>
        </div>
    </header>

    <main class="w-[80%] mx-auto">
        <section>
            <div class="bg-white p-6 shadow-2xl mt-10 flex gap-4 rounded-2xl ">
                <button onclick="filterIssues('all')" class="active label-btn btn btn-neutral btn-outline">All</button>
                <button onclick="filterIssues('open')" class="label-btn btn btn-neutral btn-outline">Open</button>
                <button onclick="filterIssues('closed')" class="label-btn btn btn-neutral btn-outline">Closed</button>

            </div>
        </section>

        <section>
            <div class="bg-white p-6 shadow-2xl mt-6 flex justify-between items-center">
                <!-- left  -->
                <div class="flex gap-2 items-center">
                    <img class="bg-[#ECE4FF] py-3 px-3 rounded-[100%]" src="./assets/Aperture.png" alt="">
                    <div>
                        <h2 id="total-issues" class="text-xl font-bold">0 Issues</h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <!-- right -->
                <div class="flex gap-4">
                    <p><i class="fa-solid text-green-500 fa-circle"></i> <span>Open</span></p>
                    <p><i class="fa-solid text-purple-500 fa-circle"></i> <span>Closed</span></p>
                </div>
            </div>
            <hr class="text-gray-200 shadow-2xl">
            <!-- all issue containar -->
            <div id="all-issues-containar" class="bg-white shadow-2xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-6">

            </div>
        </section>

        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="issue-containar">

                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-active btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>



        <!-- loading spineer -->
        <div class=" h-full flex justify-center items-center">
            <span id="loading-spinner"
                class="hidden loading loading-dots loading-xl"></span>
        </div>

    </main>

    <script src="./main.js"></script>
</body>

</html>
