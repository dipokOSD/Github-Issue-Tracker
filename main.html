<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Issue | Tracker</title>
    <!-- link css  -->
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./assets/github (1).png" type="image/x-icon">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind and daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="w-11/12 mx-auto flex justify-between items-center">
                <div class="flex gap-3 items-center">
                    <img src="./assets/github-logo.png" alt="">
                    <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                </div>
                <div class="flex gap-3">
                    <label class="input input-bordered flex items-center gap-2">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" class="grow" placeholder="Search" />
                    </label>
                    <button class="btn btn-primary">+ New Issue</button>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
